<!doctype html>
<html lang="ja"><!-- 日本語での記述 -->
  <head>
    <meta charset="utf-8"><!--文字コードの指定-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5">
        <div class="row mt-5 ms-2">
            <div class="col-md-4">
              <div class="row">
                <div class="col-4 bg-danger"><img src="https://media.gamepedia.jp/wp-content/uploads/sites/84/2025/12/11083237/c0714a6ae52c9d3b404526976ad59470-1024x576.jpg" class="img-fluid" alt="..."></div>
                <div class="col-4 bg-danger"><img src="https://media.gamepedia.jp/wp-content/uploads/sites/84/2025/12/11083237/c0714a6ae52c9d3b404526976ad59470-1024x576.jpg" class="img-fluid" alt="..."></div>
                <div class="col-4 bg-danger"><img src="https://media.gamepedia.jp/wp-content/uploads/sites/84/2025/12/11083237/c0714a6ae52c9d3b404526976ad59470-1024x576.jpg" class="img-fluid" alt="..."></div>
              </div>
              <h1>ゲンシグラードン</h1>
              <p>べにいろのたまによって復活した本来の姿。エネルギーがマグマとなり体から溢れ出る。</p>
            </div>
            <div class="col-md-4">
              <div class="row">
                <div class="col-4 bg-primary"><img src="https://img.gamewith.jp/img/53c4a5814b78527a4b1c8b9ed1610394.png" class="img-fluid" alt="..."></div>
                <div class="col-4 bg-primary"><img src="https://img.gamewith.jp/img/53c4a5814b78527a4b1c8b9ed1610394.png" class="img-fluid" alt="..."></div>
                <div class="col-4 bg-primary"><img src="https://img.gamewith.jp/img/53c4a5814b78527a4b1c8b9ed1610394.png" class="img-fluid" alt="..."></div>
              </div>
              <h1>メガレックウザ</h1>
              <p>何億年も生き続けていると言われる。グラードンとカイオーガの争いを収めたという伝説が残されている。</p>
            </div>
            <div class="col-md-4">
              <div class="row">
                <div class="col-4 bg-success"><img src="https://img.gamewith.jp/img/a8195935c3fdd996ac0c1cfd07124f3f.png" class="img-fluid" alt="..."></div>
                <div class="col-4 bg-success"><img src="https://img.gamewith.jp/img/a8195935c3fdd996ac0c1cfd07124f3f.png" class="img-fluid" alt="..."></div>
                <div class="col-4 bg-success"><img src="https://img.gamewith.jp/img/a8195935c3fdd996ac0c1cfd07124f3f.png" class="img-fluid" alt="..."></div>
              </div>
              <h1>ゲンシカイオーガ</h1>
              <p>幻視世界のエネルギーであるあいいろのたまによって回帰した。肉体が海水に似ている。</p>
            </div>
        </div>
        <div class="row">
          <div class="col-3"><img src="https://appmedia.jp/wp-content/uploads/2025/10/banner-4.webp" class="img-fluid" alt="..."></div>
          <div class="col-3"><img src="https://www.pokemon.co.jp/ex/legends_z-a/assets/img/story/250722_03/img_01.webp" class="img-fluid" alt="..."></div>
          <div class="col-3"><img src="https://img.gamewith.jp/img/71e3e43ce54645ac2ab2bd3e95e6fce3.png" class="img-fluid" alt="..."></div>
          <div class="col-3"><img src="https://i.ytimg.com/vi/PNhJDtJMDhw/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDHWoAsZlPDhGVNv5Sa_V-KKWgC2g" class="img-fluid" alt="..."></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
